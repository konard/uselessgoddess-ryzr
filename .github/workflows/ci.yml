name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # The test suite is the project's correctness contract:
  # - ryzr-core oracle tests pin the synchronous tick semantics,
  # - differential tests run every engine in lockstep against the reference
  #   interpreter on randomized sequential circuits,
  # - ryzr-riscv tests run the gate-level RV32I core in lockstep against the
  #   instruction-level emulator, comparing pc and all 32 registers after
  #   every retired instruction — execution results must match exactly.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - name: Test without default features (no jit, no rayon)
        run: cargo test -p ryzr-backend --no-default-features
